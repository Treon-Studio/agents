name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Notify Discord - Deployment Started
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"embeds": [{"title": "🚀 Deployment Started", "description": "Deploying **agents** from branch `${{ github.ref_name }}`\nCommit: `${{ github.event.head_commit.message }}`", "color": 3447003}]}' \
          https://discord.com/api/webhooks/1502909275562053692/luKXCHFSA5F6Ifv4kCkSlsF4iXlbmOtdubVffvKj90ZJeebVl78oPjimY38p3H3R-u9m

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Notify Discord - Deployment Success
        if: success()
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"embeds": [{"title": "✅ Deployment Success", "description": "Successfully deployed **agents** to Cloudflare Workers!\nBranch: `${{ github.ref_name }}`", "color": 3066993}]}' \
          https://discord.com/api/webhooks/1502909275562053692/luKXCHFSA5F6Ifv4kCkSlsF4iXlbmOtdubVffvKj90ZJeebVl78oPjimY38p3H3R-u9m

      - name: Notify Discord - Deployment Failed
        if: failure()
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"embeds": [{"title": "❌ Deployment Failed", "description": "Failed to deploy **agents**.\nCheck the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.", "color": 15158332}]}' \
          https://discord.com/api/webhooks/1502909275562053692/luKXCHFSA5F6Ifv4kCkSlsF4iXlbmOtdubVffvKj90ZJeebVl78oPjimY38p3H3R-u9m