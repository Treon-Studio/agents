name: Skill Added Notification

on:
  push:
    branches:
      - main
    paths:
      - '.opencode/skills/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Detect new skills
        id: skills
        run: |
          # Get commits that modified skills
          SKILLS_COMMITS=$(git log --oneline --format="%H %s" -- '.opencode/skills/**' | tail -1)
          
          if [ -z "$SKILLS_COMMITS" ]; then
            echo "No skills changed"
            echo "skills_json=[]" >> $GITHUB_OUTPUT
            echo "commit_count=0" >> $GITHUB_OUTPUT
          else
            # Get list of skills with commit messages
            SKILLS_JSON=$(git log --oneline --format='{"name":"%s","sha":"%h","url":"https://github.com/${{ github.repository }}/commit/%H"}' -- '.opencode/skills/**' | jq -s '.' | jq '[.[] | {name: .name, sha: .sha, url: .url}]')
            echo "skills_json=$SKILLS_JSON" >> $GITHUB_OUTPUT
            echo "commit_count=$(echo "$SKILLS_JSON" | jq length)" >> $GITHUB_OUTPUT
            
            # Get author info from latest commit
            AUTHOR_NAME=$(git log -1 --format='%an')
            AUTHOR_EMAIL=$(git log -1 --format='%ae')
            echo "author_name=$AUTHOR_NAME" >> $GITHUB_OUTPUT
            
            echo "Detected $(echo $SKILLS_JSON | jq length) skill(s) changed"
          fi

      - name: Send Discord notification
        if: steps.skills.outputs.commit_count != '0'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          SKILLS_JSON: ${{ steps.skills.outputs.skills_json }}
          AUTHOR_NAME: ${{ steps.skills.outputs.author_name }}
          REPO: ${{ github.repository }}
        run: |
          COMMIT_COUNT=${{ steps.skills.outputs.commit_count }}
          
          # Build skill list for display
          SKILL_NAMES=$(echo '$SKILLS_JSON' | jq -r '.[] | "- \\(.\"name\") (\\(.sha))"' | sed 's/"/\\"/g')
          
          # Build Discord embed
          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "🆕 New Skill Added",
              "color": 3447003,
              "description": "A new skill has been added to the repository",
              "fields": [
                {
                  "name": "Repository",
                  "value": "$REPO",
                  "inline": true
                },
                {
                  "name": "Author",
                  "value": "$AUTHOR_NAME",
                  "inline": true
                },
                {
                  "name": "Skill(s) Added",
                  "value": $SKILL_NAMES
                },
                {
                  "name": "Total Commit(s)",
                  "value": "$COMMIT_COUNT",
                  "inline": true
                }
              ],
              "footer": {
                "text": "OpenAgents CI"
              },
              "timestamp": "${{ github.event.head_commit.timestamp }}"
            }]
          }
          EOF)
          
          response=$(curl -s -w "%{http_code}" -o /dev/null -H "Content-Type: application/json" -d "$PAYLOAD" $DISCORD_WEBHOOK)
          if [ "$response" = "204" ] || [ "$response" = "200" ]; then
            echo "Discord notification sent successfully"
          else
            echo "Failed to send Discord notification (HTTP $response)"
            exit 1
          fi