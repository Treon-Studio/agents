name: Skill Added Notification

on:
  push:
    branches:
      - main
    paths:
      - '.opencode/skills/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ secrets.DISCORD_WEBHOOK != '' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Detect new skills
        id: skills
        run: |
          # Get list of skills that were modified
          SKILLS_CHANGED=$(git diff --name-only HEAD~1 HEAD -- '.opencode/skills/**' 2>/dev/null | grep -v '\.gitignore' || true)

          if [ -z "$SKILLS_CHANGED" ]; then
            echo "No skills changed"
            echo "skills_json=[]" >> $GITHUB_OUTPUT
            echo "has_skills=false" >> $GITHUB_OUTPUT
          else
            echo "Skills changed:"
            echo "$SKILLS_CHANGED"

            # Build JSON array of skill names
            SKILLS_JSON="["
            FIRST=true
            for skill in $SKILLS_CHANGED; do
              SKILL_NAME=$(echo "$skill" | sed 's|.opencode/skills/||' | sed 's|/SKILL.md||' | sed 's|/.*||')
              if [ "$FIRST" = true ]; then
                FIRST=false
              else
                SKILLS_JSON="$SKILLS_JSON,"
              fi
              SKILLS_JSON="$SKILLS_JSON\"$SKILL_NAME\""
            done
            SKILLS_JSON="$SKILLS_JSON]"
            echo "skills_json=$SKILLS_JSON" >> $GITHUB_OUTPUT
            echo "has_skills=true" >> $GITHUB_OUTPUT

            echo "Detected skill changes"
          fi

      - name: Get commit info
        if: steps.skills.outputs.has_skills == 'true'
        run: |
          echo "Commit message: ${{ github.event.head_commit.message }}"
          echo "Author: ${{ github.event.head_commit.author.name }}"
          echo "SHA: ${{ github.sha }}"

      - name: Send Discord notification
        if: steps.skills.outputs.has_skills == 'true'
        env:
          DISCORD_WEBHOOK: https://discord.com/api/webhooks/1502909275562053692/luKXCHFSA5F6Ifv4kCkSlsF4iXlbmOtdubVffvKj90ZJeebVl78oPjimY38p3H3R-u9m
          SKILLS_JSON: ${{ steps.skills.outputs.skills_json }}
          AUTHOR_NAME: ${{ github.event.head_commit.author.name }}
          REPO: ${{ github.repository }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          TIMESTAMP: ${{ github.event.head_commit.timestamp }}
        run: |
          echo "Building Discord notification..."

          # Build Discord embed
          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "🆕 New Skill Added",
              "color": 3447003,
              "description": "A new skill has been added to the repository",
              "fields": [
                {
                  "name": "Repository",
                  "value": "$REPO",
                  "inline": true
                },
                {
                  "name": "Author",
                  "value": "$AUTHOR_NAME",
                  "inline": true
                },
                {
                  "name": "Skill(s) Added",
                  "value": $SKILLS_JSON
                },
                {
                  "name": "Commit Message",
                  "value": "$COMMIT_MSG"
                }
              ],
              "url": "https://github.com/$REPO/commit/$COMMIT_SHA",
              "footer": {
                "text": "OpenAgents CI"
              },
              "timestamp": "$TIMESTAMP"
            }]
          }
          EOF)

          echo "Sending notification..."
          response=$(curl -s -w "%{http_code}" -o /dev/null -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK")

          if [ "$response" = "204" ] || [ "$response" = "200" ]; then
            echo "✓ Discord notification sent successfully"
          else
            echo "✗ Failed to send Discord notification (HTTP $response)"
            exit 1
          fi