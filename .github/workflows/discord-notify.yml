name: Discord Notification

on:
  push:
    branches:
      - main
  create:
    ref_type: branch

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Detect skills changes
        id: skills
        run: |
          SKILLS_CHANGED=$(git diff --name-only HEAD~1 HEAD -- '.opencode/skills/**' 2>/dev/null | grep -v '\.gitignore' || true)

          if [ -z "$SKILLS_CHANGED" ]; then
            echo "has_skills=false" >> $GITHUB_OUTPUT
            echo "skills_json=[]" >> $GITHUB_OUTPUT
          else
            echo "has_skills=true" >> $GITHUB_OUTPUT

            # Build JSON array of skill names
            SKILLS_JSON="["
            FIRST=true
            for skill in $SKILLS_CHANGED; do
              SKILL_NAME=$(echo "$skill" | sed 's|.opencode/skills/||' | sed 's|/SKILL.md||' | sed 's|/.*||')
              if [ "$FIRST" = true ]; then
                FIRST=false
              else
                SKILLS_JSON="$SKILLS_JSON,"
              fi
              SKILLS_JSON="$SKILLS_JSON\"$SKILL_NAME\""
            done
            SKILLS_JSON="$SKILLS_JSON]"
            echo "skills_json=$SKILLS_JSON" >> $GITHUB_OUTPUT

            echo "Skills changed:"
            echo "$SKILLS_CHANGED"
          fi

      - name: Send notification - New branch created
        if: github.event_name == 'create' && github.event.ref_type == 'branch'
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"embeds": [{"title": "🌿 New Branch Created", "description": "Branch: `${{ github.event.ref }}`", "color": 3447003}]}' \
          https://discord.com/api/webhooks/1502909275562053692/luKXCHFSA5F6Ifv4kCkSlsF4iXlbmOtdubVffvKj90ZJeebVl78oPjimY38p3H3R-u9m

      - name: Send notification - Skill Added
        if: github.ref == 'refs/heads/main' && steps.skills.outputs.has_skills == 'true'
        run: |
          MSG=$(git log -1 --format='%s')
          AUTHOR=$(git log -1 --format='%an')
          TIMESTAMP=$(git log -1 --format='%cI')
          REPO="${{ github.repository }}"
          COMMIT_SHA="${{ github.sha }}"
          SKILLS_JSON="${{ steps.skills.outputs.skills_json }}"

          # Use jq to build JSON payload safely
          curl -X POST -H "Content-Type: application/json" \
          -d "$(jq -n \
            --arg title "🆕 New Skill Added" \
            --arg repo "$REPO" \
            --arg author "$AUTHOR" \
            --arg skills "$SKILLS_JSON" \
            --arg msg "$MSG" \
            --arg ts "$TIMESTAMP" \
            --arg url "https://github.com/$REPO/commit/$COMMIT_SHA" \
            '{
              embeds: [{
                title: $title,
                description: "A new skill has been added to the repository",
                color: 3447003,
                fields: [
                  {name: "Repository", value: $repo, inline: true},
                  {name: "Author", value: $author, inline: true},
                  {name: "Skill(s) Added", value: $skills},
                  {name: "Commit Message", value: $msg}
                ],
                url: $url,
                footer: {text: "OpenAgents CI"},
                timestamp: $ts
              }]
            }')" \
          https://discord.com/api/webhooks/1502909275562053692/luKXCHFSA5F6Ifv4kCkSlsF4iXlbmOtdubVffvKj90ZJeebVl78oPjimY38p3H3R-u9m

      - name: Send notification - Push to main (non-skill)
        if: github.ref == 'refs/heads/main' && steps.skills.outputs.has_skills == 'false'
        run: |
          MSG=$(git log -1 --format='%s')
          AUTHOR=$(git log -1 --format='%an')
          TIMESTAMP=$(git log -1 --format='%cI')
          # Use jq to build JSON safely with proper escaping
          curl -X POST -H "Content-Type: application/json" \
          -d "$(jq -n \
            --arg title "📦 Push to Main" \
            --arg msg "$MSG" \
            --arg author "$AUTHOR" \
            --arg ts "$TIMESTAMP" \
            '{embeds: [{title: $title, description: "Commit: \($msg)\nAuthor: \($author)", color: 3066993, timestamp: $ts}]}')" \
          https://discord.com/api/webhooks/1502909275562053692/luKXCHFSA5F6Ifv4kCkSlsF4iXlbmOtdubVffvKj90ZJeebVl78oPjimY38p3H3R-u9m

      - name: Send notification - Push to branch
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        run: |
          MSG=$(git log -1 --format='%s')
          AUTHOR=$(git log -1 --format='%an')
          TIMESTAMP=$(git log -1 --format='%cI')
          BRANCH="${{ github.ref_name }}"
          # Use jq to build JSON safely with proper escaping
          curl -X POST -H "Content-Type: application/json" \
          -d "$(jq -n \
            --arg title "📝 Push to Branch" \
            --arg branch "$BRANCH" \
            --arg msg "$MSG" \
            --arg author "$AUTHOR" \
            --arg ts "$TIMESTAMP" \
            '{embeds: [{title: $title, description: "Branch: \($branch)\nCommit: \($msg)\nAuthor: \($author)", color: 3447003, timestamp: $ts}]}')" \
          https://discord.com/api/webhooks/1502909275562053692/luKXCHFSA5F6Ifv4kCkSlsF4iXlbmOtdubVffvKj90ZJeebVl78oPjimY38p3H3R-u9m